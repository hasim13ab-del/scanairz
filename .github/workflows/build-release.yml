name: Build ScanAiRZ Applications (Release)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.0'
        cache: true
        
    - name: Setup Dependencies
      run: |
        flutter pub get
        
    - name: Setup Release Signing
      id: setup_signing
      run: |
        # Check if secrets are available
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "KEYSTORE_BASE64 not found, using debug build"
          echo "USE_RELEASE=false" >> $GITHUB_ENV
        else
          echo "KEYSTORE_BASE64 found, using release build"
          echo "USE_RELEASE=true" >> $GITHUB_ENV
       
          # Create keystore directory
          mkdir -p android/key
       
          # Decode base64 keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/key/scanairz-key.jks
       
          # Create key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
        fi
        
    - name: Build Android APK
      run: |
        if [ "${{ env.USE_RELEASE }}" = "true" ]; then
          flutter build apk --release
        else
          flutter build apk --debug
        fi
        
    - name: Build Desktop Apps
      run: |
        flutter build linux --release
        flutter build macos --release
        flutter build windows --release
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: scanairz-apps
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          build/linux/x64/release/bundle/
          build/macos/Release/
          build/windows/Release/