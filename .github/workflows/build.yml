name: Build ScanAiRZ Applications

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix plugin namespaces for AGP 8
        run: |
          find $HOME/.pub-cache -name "build.gradle" -path "*/android/build.gradle" | while read f; do
            if grep -q "com.android.library" "$f" && ! grep -q "namespace" "$f"; then
              MANIFEST="$(dirname "$f")/src/main/AndroidManifest.xml"
              if [ -f "$MANIFEST" ]; then
                PKG=$(grep -oP 'package="\K[^"]+' "$MANIFEST" || true)
                if [ -n "$PKG" ]; then
                  sed -i "s/android {/android {\n    namespace '$PKG'/" "$f"
                  echo "Patched namespace: $PKG"
                fi
              fi
            fi
          done

      - name: Set up release signing keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/scanairz-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=scanairz-release.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties
          echo "Signing keystore configured."

      - name: Patch flutter_bluetooth_serial namespace
        run: |
          sed -i "s/android {/android {\n    namespace 'io.github.edufolly.flutterbluetoothserial'/" $HOME/.pub-cache/hosted/pub.dev/flutter_bluetooth_serial-0.4.0/android/build.gradle
          sed -i "s/compileSdkVersion 30/compileSdkVersion 33/" $HOME/.pub-cache/hosted/pub.dev/flutter_bluetooth_serial-0.4.0/android/build.gradle

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB for Play Store
        run: flutter build appbundle --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: scanairz-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: scanairz-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-pc-companion:
    name: Build Windows PC Companion
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop target
        run: flutter config --enable-windows-desktop

      - name: Get companion dependencies
        working-directory: tools/pc_companion
        run: flutter pub get

      - name: Build companion release
        working-directory: tools/pc_companion
        run: flutter build windows --release

      - name: Package companion as zip
        shell: pwsh
        run: |
          $src = "tools/pc_companion/build/windows/x64/runner/Release"
          Compress-Archive -Path "$src\*" -DestinationPath "scanairz-pc-companion.zip" -Force

      - name: Upload PC Companion
        uses: actions/upload-artifact@v4
        with:
          name: scanairz-pc-companion-windows
          path: scanairz-pc-companion.zip
