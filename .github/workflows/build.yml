name: Build ScanAiRZ Applications

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix plugin namespaces (AGP 8+ compatibility)
        run: |
          find $HOME/.pub-cache -name "build.gradle" -path "*/android/build.gradle" | while read f; do
            if grep -q "com.android.library" "$f" && ! grep -q "namespace" "$f"; then
              MANIFEST="$(dirname "$f")/src/main/AndroidManifest.xml"
              if [ -f "$MANIFEST" ]; then
                PKG=$(grep -oP 'package="\K[^"]+' "$MANIFEST" || true)
                if [ -n "$PKG" ]; then
                  sed -i "s/android {/android {\n    namespace '$PKG'/" "$f"
                  echo "Patched: $f  =>  namespace '$PKG'"
                fi
              fi
            fi
          done

      - name: Build Android APK (debug)
        run: flutter build apk --debug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
