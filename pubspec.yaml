name: scanairz
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  mobile_scanner: ^4.0.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  share_plus: ^7.2.2
